[project]
name = "curios"
version = "0.1.0"
description = "Cross-project transcript memory for Cursor IDE"
requires-python = ">=3.11"
dependencies = [
    "chromadb>=1.0",
    "mcp>=1.0",
    "pyyaml>=6.0",
]

[project.scripts]
curios-server = "curios.server:main"
curios-index = "curios.indexer:main"
curios-maintain = "curios.maintain:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
