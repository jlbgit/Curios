[project]
name = "curios"
version = "0.3.0"
description = "Cross-project transcript memory for Cursor IDE"
requires-python = ">=3.11"
dependencies = [
    "chromadb>=1.0",
    "mcp>=1.0",
    "pyyaml>=6.0",
]

[project.scripts]
curios = "curios.install:main"
curios-server = "curios.server:main"
curios-index = "curios.indexer:main"
curios-maintain = "curios.maintain:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
curios = ["cursor/*.mdc", "cursor/*.md"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
eval = [
    "deepeval>=3.9",
    "anthropic>=0.40",
]
